    11: ["Hill reps",      "8 × 45 s uphill strong / jog down, then 5 min steady."],
    12: ["Easy + strides", "6 km easy + 6 × 20 s strides. Down week before the sharp block."],
    13: ["Tempo",          "3 × 8 min @ 6:00 (90 s jog). Threshold confidence."],
    14: ["Goal-pace reps", "6 × 1 km @ 6:00 with 90 s jog. Feel exactly how race pace sits."],
    15: ["Easy + strides", "6 km easy + 6 strides. Down week."],
    16: ["Race-pace blocks","3 × 2 km @ 6:00 (2 min jog). Rehearse holding it."],
    17: ["Tempo",          "25–30 min continuous @ 6:05. Long, controlled, strong."],
    18: ["Race-pace tune", "Easy run with 4 km @ 6:00 in the middle. Sharpen, don't drain."],
    19: ["Sharpener",      "4 × 800 m @ 5:50 with 90 s jog. Quick legs, low volume."],
    20: ["Pre-race touch", "Easy run + 3 × 1 min @ goal pace. Stay sharp, stay fresh."],
    21: ["Shakeout",       "Thu: 25 min very easy + 4 strides. Then rest into Sunday."],
  };
  return Q[w];
}

function buildWeeks() {
  const out = [];
  for (let w = 1; w <= 21; w++) {
    const mon = new Date(PLAN_START.getTime() + (w - 1) * 7 * 86400000);
    const sun = new Date(mon.getTime() + 6 * 86400000);
    const km = LONG[w - 1];
    const [qTitle, qDetail] = qualityOf(w);
    const isRace = w === 21;
    const longSession = isRace
      ? { tag: "Race", title: "Zevenheuvelenloop — 15 km", detail: "Sunday 13:00, Nijmegen. Goal 1:30:00 (6:00/km). Run the climbs by effort, take back time on the descents.", day: "Sun" }
      : { tag: "Long", title: `Long run — ${km} km`, detail: longRunNote(w, km), day: "Sat / Sun" };
    out.push({
      w, mon, sun,
      phase: phaseOf(w),
      focus: focusOf(w),
      sessions: [
        { tag: "Quality", title: qTitle, detail: qDetail, day: "Thu" },
        longSession,
      ],
    });
  }
  return out;
}

function longRunNote(w, km) {
  if (w >= 16 && w <= 18) return `${km} km easy with the last 3 km at steady. Time on feet is the point.`;
  if (w === 14) return `${km} km easy — your first run at race distance. Keep it relaxed.`;
  if (w >= 19) return `${km} km easy. Volume coming down so you arrive fresh.`;
  return `${km} km at easy pace (6:45–7:15). Build the engine.`;
}

function focusOf(w) {
  const p = phaseOf(w);
  if (p === "Base") return "Build the aerobic base. Consistency beats intensity right now.";
  if (p === "Build") return "Add tempo, speed and hills. The course rewards strong legs.";
  if (p === "Sharpen") return "Lock in race pace and reach race distance.";
  return "Trust the work. Freshen the legs for 15 November.";
}

const WEEKS = buildWeeks();
const TOTAL_SESSIONS = WEEKS.reduce((n, wk) => n + wk.sessions.length, 0);

/* ---------------- helpers ---------------- */
const pad = (n) => String(n).padStart(2, "0");
function secToPace(s) { if (!s || !isFinite(s)) return "—"; const m = Math.floor(s / 60); return `${m}:${pad(Math.round(s % 60))}`; }
function secToClock(s) { if (!s || !isFinite(s)) return "—"; const h = Math.floor(s / 3600); const m = Math.floor((s % 3600) / 60); const sec = Math.round(s % 60); return h > 0 ? `${h}:${pad(m)}:${pad(sec)}` : `${m}:${pad(sec)}`; }
function parseTime(str) {
  if (!str) return 0;
  const parts = str.split(":").map((x) => parseInt(x, 10));
  if (parts.some(isNaN)) return 0;
  if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
  if (parts.length === 2) return parts[0] * 60 + parts[1];
  return parts[0];
}
function fmtRange(a, b) {
  const opt = { day: "numeric", month: "short" };
  return `${a.toLocaleDateString("en-GB", opt)} – ${b.toLocaleDateString("en-GB", opt)}`;
}

const TYPE_COLOR = {
  Quality: "var(--sky)", Long: "var(--pine)", Race: "var(--clay)",
  Easy: "var(--pine)", Tempo: "var(--sky)", Intervals: "var(--warn)",
  Hills: "var(--clay)", "Goal pace": "var(--clay)", Social: "var(--ink-soft)",
};

/* ---------------- storage ---------------- */
function loadKey(key, def) {
  try { const v = localStorage.getItem(key); return v == null ? def : JSON.parse(v); }
  catch { return def; }
}
function saveKey(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
}

/* ================================================================= */
export default function App() {
  const [tab, setTab] = useState("overview");

  const [checkins, setCheckins] = useState([]);
  const [done, setDone] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [now, setNow] = useState(new Date());
  const [name, setName] = useState("");

  useEffect(() => {
    (async () => {
      setRuns(await loadKey("zhl:runs", []));
      setCheckins(await loadKey("zhl:checkins", []));
      setDone(await loadKey("zhl:done", {}));
      setName(await loadKey("zhl:name", ""));
      setLoaded(true);
    })();
    const t = setInterval(() => setNow(new Date()), 60000);
    return () => clearInterval(t);
  }, []);

  const daysLeft = Math.max(0, Math.ceil((RACE - now) / 86400000));
  const progress = Math.min(1, Math.max(0, (now - PLAN_START) / (RACE - PLAN_START)));
  const currentWeek = Math.min(21, Math.max(1, Math.floor((now - PLAN_START) / (7 * 86400000)) + 1));
  const doneCount = Object.values(done).filter(Boolean).length;
  const exportData = () => {

        if (d.done && typeof d.done === "object") { setDone(d.done); saveKey("zhl:done", d.done); }

    .field{background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:14px;width:100%;font-family:inherit;color:var(--ink);}

  );

/* ---------------- overview ---------------- */

  const longest = logged.reduce((m, r) => Math.max(m, r.distance), 0);
  const recent = [...logged].slice(-3);
  const latest = logged.length ? logged[logged.length - 1] : null;
  const avgRecent = recent.length ? recent.reduce((s, r) => s + r.time / r.distance, 0) / recent.length : 0;
  const bestAt = (d) => { const e = logged.filter((r) => r.distance >= d); return e.length ? Math.min.apply(null, e.map((r) => r.time / r.distance)) * d : null; };
  const pbs = [[1, "1K"], [5, "5K"], [10, "10K"], [15, "15K"]].map((x) => ({ l: x[1], t: bestAt(x[0]) }));

        <Stat label="Training week" value={`${currentWeek} / 21`} mono sub={week.phase} />
        <Stat label="Sessions ticked" value={`${doneCount} / ${TOTAL_SESSIONS}`} mono />

      {/* the climb */}
      <div className="card" style={{ padding: "18px 18px 6px" }}>

      {/* personal bests */}
      <div className="card" style={{ padding: 18 }}>
        <div className="eyebrow">Personal bests</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(78px,1fr))", gap: 10, marginTop: 12 }}>
          {pbs.map((p) => (
            <div key={p.l} style={{ textAlign: "center", padding: "12px 6px", border: "1px solid var(--line)", borderRadius: 10, background: "#fff" }}>
              <div className="eyebrow" style={{ color: "var(--ink-soft)" }}>{p.l}</div>

        </p>
      </div>

      <div className="card" style={{ padding: 18 }}>

            <div className="eyebrow">This week · {fmtRange(week.mon, week.sun)}</div>

        <div className="eyebrow">Latest run</div>

          <p style={{ color: "var(--ink-soft)", fontSize: 14, marginTop: 10 }}>Loading your log…</p>
        ) : logged.length === 0 ? (

            <div style={{ display: "flex", alignItems: "center", gap: 22, flexWrap: "wrap" }}>

  );
}

function Stat({ label, value, sub, mono, accent }) {
  return (
    <div className="card" style={{ padding: "14px 16px", background: accent ? "var(--clay)" : "var(--panel)", borderColor: accent ? "var(--clay)" : "var(--line)" }}>

      <div className={mono ? "mono" : ""} style={{ fontSize: 27, fontWeight: 700, marginTop: 4, color: accent ? "#fff" : "var(--ink)" }}>{value}</div>
      {sub && <div style={{ fontSize: 12, color: accent ? "#fbe3d3" : "var(--ink-soft)", marginTop: 1 }}>{sub}</div>}
    </div>
  );
}

function ClimbViz({ progress }) {
  const W = 640, H = 150, pad = 6;
  const terrain = (t) => {
    const bump = (1 - Math.cos(t * 7 * 2 * Math.PI)) / 2; // 7 peaks
    const env = 0.35 + 0.65 * t;
    const base = 0.12 + 0.45 * t;
    return Math.min(1, base + 0.32 * bump * env);
  };
  const N = 160;
  const pts = [];
  for (let i = 0; i <= N; i++) {
    const t = i / N;
    const x = pad + t * (W - 2 * pad);
    const y = H - pad - terrain(t) * (H - 2 * pad);
    pts.push([x, y]);
  }
  const line = pts.map((p, i) => `${i ? "L" : "M"}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" ");
  const area = `${line} L${W - pad} ${H} L${pad} ${H} Z`;
  const px = pad + progress * (W - 2 * pad);
  const py = H - pad - terrain(progress) * (H - 2 * pad);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      <defs>
        <linearGradient id="hillg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor="var(--pine)" stopOpacity="0.20" />
          <stop offset="1" stopColor="var(--pine)" stopOpacity="0.04" />
        </linearGradient>
      </defs>
      <path d={area} fill="url(#hillg)" />
      <path d={line} fill="none" stroke="var(--pine)" strokeWidth="2" />
      <line x1={px} y1={py} x2={px} y2={H} stroke="var(--clay)" strokeWidth="1.5" strokeDasharray="3 3" opacity="0.6" />
      <circle cx={px} cy={py} r="6" fill="var(--clay)" stroke="#fff" strokeWidth="2" />
      <g transform={`translate(${W - pad - 2},${H - pad})`}>
        <Flag size={16} color="var(--clay)" style={{ transform: "translate(-14px,-30px)" }} />
      </g>
      <text x={pad} y={H - 4} className="mono" style={{ fontSize: 10, fill: "var(--ink-soft)" }}>start of training</text>
      <text x={W - pad} y={H - 4} textAnchor="end" className="mono" style={{ fontSize: 10, fill: "var(--clay)" }}>race day</text>
    </svg>
  );
}

function SessionRow({ s }) {

      </div>

}

/* ---------------- plan view ---------------- */
function PlanView({ done, setDone, currentWeek }) {
  const [open, setOpen] = useState(currentWeek);
  const phaseColor = { Base: "var(--pine)", Build: "var(--sky)", Sharpen: "var(--clay)", Taper: "var(--ink-soft)" };

  const toggle = (id) => {
    const next = { ...done, [id]: !done[id] };
    setDone(next); saveKey("zhl:done", next);
  };

  return (
    <div style={{ display: "grid", gap: 10 }}>
      <p style={{ fontSize: 13.5, color: "var(--ink-soft)", lineHeight: 1.5, margin: "0 0 4px" }}>
        Two focused sessions a week across four phases. Tick them off as you go — your progress feeds the climb on the overview.
      </p>
      {["Base", "Build", "Sharpen", "Taper"].map((ph) => (
        <span key={ph} style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12, marginRight: 14, color: "var(--ink-soft)" }}>
          <span style={{ width: 9, height: 9, borderRadius: 3, background: phaseColor[ph] }} /> {ph}
        </span>
      ))}
      <div style={{ display: "grid", gap: 8, marginTop: 6 }}>
        {WEEKS.map((wk) => {
          const isOpen = open === wk.w;
          const all = wk.sessions.every((_, i) => done[`${wk.w}-${i}`]);
          return (
            <div key={wk.w} className="card" style={{ overflow: "hidden", borderColor: wk.w === currentWeek ? "var(--clay)" : "var(--line)" }}>
              <button onClick={() => setOpen(isOpen ? 0 : wk.w)}
                style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "13px 15px", border: "none", background: "none", cursor: "pointer", fontFamily: "inherit", textAlign: "left" }}>
                <span style={{ width: 4, alignSelf: "stretch", borderRadius: 4, background: phaseColor[wk.phase] }} />
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
                    <strong style={{ fontSize: 15 }}>Week {wk.w}</strong>
                    {wk.w === currentWeek && <span style={{ fontSize: 10, fontWeight: 700, color: "var(--clay)", letterSpacing: ".05em" }}>NOW</span>}
                    {wk.w === 21 && <span style={{ fontSize: 10, fontWeight: 700, color: "var(--clay)", letterSpacing: ".05em" }}>RACE</span>}
                    <span className="mono" style={{ fontSize: 11.5, color: "var(--ink-soft)" }}>{fmtRange(wk.mon, wk.sun)}</span>
                  </div>
                  <div style={{ fontSize: 12.5, color: "var(--ink-soft)", marginTop: 2 }}>{wk.phase} · {wk.sessions.map((s) => s.title).join(" + ")}</div>
                </div>
                {all && <Check size={16} color="var(--pine)" />}
                <ChevronDown size={18} color="var(--ink-soft)" style={{ transform: isOpen ? "rotate(180deg)" : "none", transition: "transform .2s" }} />
              </button>
              {isOpen && (
                <div style={{ padding: "0 15px 15px", display: "grid", gap: 9 }}>
                  <p style={{ fontSize: 13, color: "var(--ink-soft)", margin: "0 0 2px", lineHeight: 1.45 }}>{wk.focus}</p>
                  {wk.sessions.map((s, i) => {
                    const id = `${wk.w}-${i}`;
                    return (
                      <div key={i} style={{ display: "flex", gap: 11, alignItems: "flex-start", padding: "11px 12px", border: "1px solid var(--line)", borderRadius: 10, background: done[id] ? "var(--panel-2)" : "#fff", opacity: done[id] ? 0.7 : 1 }}>
                        <button onClick={() => toggle(id)} aria-label="toggle done"
                          style={{ flexShrink: 0, width: 22, height: 22, borderRadius: 6, border: `1.5px solid ${done[id] ? "var(--pine)" : "var(--line)"}`, background: done[id] ? "var(--pine)" : "#fff", cursor: "pointer", display: "grid", placeItems: "center", marginTop: 1 }}>
                          {done[id] && <Check size={14} color="#fff" />}
                        </button>
                        <div style={{ flex: 1 }}>
                          <div>
                            <span style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".05em", color: TYPE_COLOR[s.tag] }}>{s.tag}</span> <strong style={{ fontSize: 14.5, textDecoration: done[id] ? "line-through" : "none" }}>{s.title}</strong>
                          </div>
                          <div style={{ fontSize: 13, color: "var(--ink-soft)", marginTop: 3, lineHeight: 1.45 }}>{s.detail}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

        <div className="eyebrow">Your training paces</div>
        <div style={{ display: "grid", gap: 8 }}>
          {PACES.map((p) => (
            <div key={p.key} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", border: "1px solid var(--line)", borderRadius: 10, background: "#fff" }}>
              <span style={{ width: 8, height: 28, borderRadius: 4, background: p.color, flexShrink: 0 }} />
              <div style={{ flex: 1 }}>
                <strong style={{ fontSize: 14 }}>{p.label}</strong>
                <div style={{ fontSize: 12.5, color: "var(--ink-soft)", lineHeight: 1.4 }}>{p.note}</div>

  );
}

/* ---------------- run log ---------------- */
const RUN_TYPES = ["Easy", "Long", "Tempo", "Intervals", "Hills", "Goal pace", "Race"];
function LogView({ runs, setRuns, loaded }) {
  const today = new Date().toISOString().slice(0, 10);
  const [form, setForm] = useState({ date: today, type: "Easy", distance: "", time: "", feel: 3, notes: "", social: false });
  const [metric, setMetric] = useState("pace");
  const [fitMsg, setFitMsg] = useState("");
  const importFit = (file) => {
    if (!file) return;
    setFitMsg("Reading " + file.name + " \u2026");
    const reader = new FileReader();
    reader.onerror = () => setFitMsg("Couldn't read that file.");
    reader.onload = () => {
      try {
        const FP = (typeof FitParser === "function") ? FitParser : (FitParser && FitParser.default);
        if (!FP) { setFitMsg("The .fit reader didn't load \u2014 try logging the run by hand."); return; }
        const fp = new FP({ force: true, speedUnit: "km/h", lengthUnit: "km", temperatureUnit: "celsius", elapsedRecordField: true, mode: "list" });
        fp.parse(reader.result, (err, data) => {
          if (err || !data) { setFitMsg("Couldn't read that file \u2014 try logging the run by hand."); return; }
          const recs = (data.records || []).filter((r) => r && r.distance != null && r.timestamp);
          const sess = (data.sessions && data.sessions[0]) || {};
          const distKm = sess.total_distance != null ? sess.total_distance : (recs.length ? recs[recs.length - 1].distance : 0);
          const timeSec = sess.total_timer_time != null ? sess.total_timer_time
            : (sess.total_elapsed_time != null ? sess.total_elapsed_time
            : (recs.length ? (new Date(recs[recs.length - 1].timestamp) - new Date(recs[0].timestamp)) / 1000 : 0));
          const when = sess.start_time ? new Date(sess.start_time) : (recs.length ? new Date(recs[0].timestamp) : new Date());
          if (!distKm || !timeSec) { setFitMsg("That file had no distance/time I could read \u2014 try logging it by hand."); return; }
          setForm((f) => ({ ...f, date: when.toISOString().slice(0, 10), distance: Number(distKm).toFixed(2), time: secToClock(timeSec) }));
          setFitMsg("Loaded " + Number(distKm).toFixed(2) + " km in " + secToClock(timeSec) + " (" + secToPace(timeSec / distKm) + "/km). Pick the type and how it felt, then Log run.");
        });
      } catch (e) { setFitMsg("Couldn't parse that file \u2014 try logging the run by hand."); }
    };
    reader.readAsArrayBuffer(file);
  };

  const add = () => {
    const distance = parseFloat(form.distance);
    const time = parseTime(form.time);
    if (!distance || distance <= 0 || !time) return;
    const entry = { id: Date.now(), date: form.date, type: form.type, distance, time, feel: form.feel, notes: form.notes.trim(), social: form.social };
    const next = [...runs, entry].sort((a, b) => a.date.localeCompare(b.date));
    setRuns(next); saveKey("zhl:runs", next);
    setForm({ date: today, type: "Easy", distance: "", time: "", feel: 3, notes: "", social: false });
  };
  const del = (id) => { const next = runs.filter((r) => r.id !== id); setRuns(next); saveKey("zhl:runs", next); };

  const counted = runs.filter((r) => !r.social && r.type !== "Social");
  const chartData = counted.filter((r) => r.distance > 0 && r.time > 0).map((r) => ({
    date: new Date(r.date).toLocaleDateString("en-GB", { day: "numeric", month: "short" }),
    pace: Math.round(r.time / r.distance), distance: +r.distance.toFixed(1),
  }));
  const sorted = [...runs].sort((a, b) => b.date.localeCompare(a.date));

  return (
    <div style={{ display: "grid", gap: 16 }}>
      <div className="card" style={{ padding: 18 }}>
        <div className="eyebrow">Log a run</div>
        <div style={{ marginTop: 12, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          <label style={{ ...primaryBtn, background: "var(--sky)", cursor: "pointer" }}>
            <Upload size={16} /> Import .fit file
            <input type="file" accept=".fit" style={{ display: "none" }} onChange={(e) => importFit(e.target.files && e.target.files[0])} />
          </label>
          {fitMsg && <span style={{ fontSize: 12.5, color: "var(--ink-soft)", flex: 1, minWidth: 180, lineHeight: 1.4 }}>{fitMsg}</span>}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(130px,1fr))", gap: 10, marginTop: 12 }}>
          <label style={lbl}>Date<input type="date" className="field" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} /></label>
          <label style={lbl}>Type
            <select className="field" value={form.type} onChange={(e) => setForm({ ...form, type: e.target.value })}>
              {RUN_TYPES.map((t) => <option key={t}>{t}</option>)}
            </select>
          </label>
          <label style={lbl}>Distance (km)<input className="field mono" inputMode="decimal" placeholder="10.0" value={form.distance} onChange={(e) => setForm({ ...form, distance: e.target.value })} /></label>
          <label style={lbl}>Time (mm:ss)<input className="field mono" placeholder="52:30" value={form.time} onChange={(e) => setForm({ ...form, time: e.target.value })} /></label>
        </div>
        <div style={{ marginTop: 10 }}>
          <div style={{ ...lbl, marginBottom: 6 }}>How did it feel?</div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {["Rough", "Hard", "OK", "Good", "Flying"].map((f, i) => (
              <button key={f} onClick={() => setForm({ ...form, feel: i + 1 })}
                style={{ flex: 1, minWidth: 64, padding: "8px 4px", borderRadius: 8, cursor: "pointer", fontFamily: "inherit", fontSize: 12.5, fontWeight: 600,
                  border: `1.5px solid ${form.feel === i + 1 ? "var(--sky)" : "var(--line)"}`,
                  background: form.feel === i + 1 ? "var(--sky)" : "#fff", color: form.feel === i + 1 ? "#fff" : "var(--ink-soft)" }}>{f}</button>
            ))}
          </div>
        </div>
        <div style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 9, fontSize: 13.5, color: "var(--ink-soft)" }}>
          <button onClick={() => setForm({ ...form, social: !form.social })} aria-label="mark run as social"
            style={{ width: 22, height: 22, borderRadius: 6, border: `1.5px solid ${form.social ? "var(--pine)" : "var(--line)"}`, background: form.social ? "var(--pine)" : "#fff", cursor: "pointer", display: "grid", placeItems: "center", flexShrink: 0 }}>
            {form.social && <Check size={14} color="#fff" />}
          </button>
          <span>Social / easy run — leave it out of pace, bests and trends</span>
        </div>
        <label style={{ ...lbl, marginTop: 10, display: "block" }}>Notes
          <textarea className="field" rows={2} placeholder="Weather, how the legs felt, anything that affected the run…" value={form.notes} onChange={(e) => setForm({ ...form, notes: e.target.value })} style={{ resize: "vertical" }} />
        </label>
        {form.distance && parseTime(form.time) > 0 && (
          <div className="mono" style={{ fontSize: 13, color: "var(--ink-soft)", marginTop: 8 }}>
            = {secToPace(parseTime(form.time) / parseFloat(form.distance))} / km
          </div>
        )}
        <button onClick={add} disabled={!form.distance || !parseTime(form.time)}
          style={{ ...primaryBtn, marginTop: 12, opacity: (!form.distance || !parseTime(form.time)) ? 0.5 : 1 }}>
          <Plus size={16} /> Log run
        </button>
      </div>

      {chartData.length >= 2 && (
        <div className="card" style={{ padding: "18px 12px 14px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", padding: "0 6px", alignItems: "center" }}>
            <div className="eyebrow">Progress</div>
            <div style={{ display: "flex", gap: 4 }}>
              {[["pace", "Pace"], ["distance", "Distance"]].map(([k, l]) => (
                <button key={k} onClick={() => setMetric(k)} style={{ padding: "5px 11px", borderRadius: 7, border: "1px solid var(--line)", cursor: "pointer", fontFamily: "inherit", fontSize: 12.5, fontWeight: 600, background: metric === k ? "var(--ink)" : "#fff", color: metric === k ? "#fff" : "var(--ink-soft)" }}>{l}</button>
              ))}
            </div>
          </div>
          <div style={{ height: 240, marginTop: 12 }}>
            <ResponsiveContainer width="100%" height="100%">
              {metric === "pace" ? (
                <LineChart data={chartData} margin={{ top: 5, right: 12, left: -8, bottom: 0 }}>
                  <CartesianGrid stroke="var(--line)" strokeDasharray="3 3" vertical={false} />
                  <XAxis dataKey="date" tickLine={false} axisLine={{ stroke: "var(--line)" }} />
                  <YAxis tickFormatter={secToPace} domain={[(min) => min - 15, (max) => max + 15]} tickLine={false} axisLine={false} width={48} />
                  <Tooltip formatter={(v) => [secToPace(v) + " /km", "Pace"]} contentStyle={tooltipStyle} />
                  <ReferenceLine y={GOAL_PACE} stroke="var(--clay)" strokeDasharray="5 4" label={{ value: "goal 6:00", fill: "var(--clay)", fontSize: 11, position: "insideTopRight" }} />
                  <Line type="monotone" dataKey="pace" stroke="var(--sky)" strokeWidth={2.5} dot={{ r: 3, fill: "var(--sky)" }} />
                </LineChart>
              ) : (
                <AreaChart data={chartData} margin={{ top: 5, right: 12, left: -12, bottom: 0 }}>
                  <CartesianGrid stroke="var(--line)" strokeDasharray="3 3" vertical={false} />
                  <XAxis dataKey="date" tickLine={false} axisLine={{ stroke: "var(--line)" }} />
                  <YAxis tickLine={false} axisLine={false} width={34} />
                  <Tooltip formatter={(v) => [v + " km", "Distance"]} contentStyle={tooltipStyle} />
                  <ReferenceLine y={GOAL_KM} stroke="var(--clay)" strokeDasharray="5 4" label={{ value: "race 15", fill: "var(--clay)", fontSize: 11, position: "insideTopRight" }} />
                  <Area type="monotone" dataKey="distance" stroke="var(--pine)" strokeWidth={2.5} fill="var(--pine)" fillOpacity={0.12} dot={{ r: 3, fill: "var(--pine)" }} />
                </AreaChart>
              )}
            </ResponsiveContainer>
          </div>
        </div>
      )}

      <div className="card" style={{ padding: 18 }}>
        <div className="eyebrow">History {runs.length > 0 && `· ${runs.length}`}</div>
        {!loaded ? <p style={{ color: "var(--ink-soft)", fontSize: 14, marginTop: 10 }}>Loading…</p>
          : sorted.length === 0 ? <p style={{ color: "var(--ink-soft)", fontSize: 14, marginTop: 10, lineHeight: 1.5 }}>Nothing logged yet. Add your first run above, or hand me a Strava <span className="mono">.fit</span> file in the chat and I'll fill it in.</p>
          : (
            <div style={{ display: "grid", gap: 8, marginTop: 12 }}>
              {sorted.map((r) => (
                <div key={r.id} style={{ display: "flex", gap: 12, alignItems: "center", padding: "10px 12px", border: "1px solid var(--line)", borderRadius: 10, background: "#fff" }}>
                  <span style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".04em", color: "#fff", background: TYPE_COLOR[r.type] || "var(--ink-soft)", padding: "3px 7px", borderRadius: 6, flexShrink: 0 }}>{r.type}</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", gap: 10, alignItems: "baseline", flexWrap: "wrap" }}>
                      <span className="mono" style={{ fontSize: 14, fontWeight: 700 }}>{r.distance.toFixed(1)} km</span>
                      <span className="mono" style={{ fontSize: 13, color: "var(--ink-soft)" }}>{secToClock(r.time)}</span>
                      <span className="mono" style={{ fontSize: 13, color: (r.social || r.type === "Social") ? "var(--ink-soft)" : "var(--clay)", fontWeight: 700 }}>{secToPace(r.time / r.distance)}/km</span>
                      <span style={{ fontSize: 12, color: "var(--ink-soft)" }}>{new Date(r.date).toLocaleDateString("en-GB", { day: "numeric", month: "short" })}</span>
                      {(r.social || r.type === "Social") && <span style={{ fontSize: 11, color: "var(--ink-soft)", border: "1px solid var(--line)", borderRadius: 5, padding: "1px 6px" }}>social</span>}
                    </div>
                    {r.notes && <div style={{ fontSize: 12.5, color: "var(--ink-soft)", marginTop: 2, lineHeight: 1.4 }}>{r.notes}</div>}
                  </div>
                  <button onClick={() => del(r.id)} aria-label="delete" style={{ border: "none", background: "none", cursor: "pointer", color: "var(--ink-soft)", padding: 4, flexShrink: 0 }}><Trash2 size={15} /></button>
                </div>
              ))}
            </div>
          )}
      </div>
    </div>
  );
}

/* ---------------- fuel & recovery ---------------- */
function FuelView({ checkins, setCheckins, loaded }) {
  const today = new Date().toISOString().slice(0, 10);
  const [c, setC] = useState({ date: today, eating: "", alcohol: "0", energy: 3, notes: "" });

  const add = () => {
    const entry = { id: Date.now(), ...c };
    const next = [...checkins, entry].sort((a, b) => b.date.localeCompare(a.date));
    setCheckins(next); saveKey("zhl:checkins", next);
    setC({ date: today, eating: "", alcohol: "0", energy: 3, notes: "" });
  };
  const del = (id) => { const next = checkins.filter((x) => x.id !== id); setCheckins(next); saveKey("zhl:checkins", next); };

  const blocks = [
    { icon: Footprints, title: "Train to get faster, fuel to train well", color: "var(--clay)",
      body: "For most runners the biggest lever on race pace is the training itself, not chasing a lower number on the scale. Eating too little tends to cost you good sessions and slow your recovery, while consistent training plus cleaner everyday food does the rest on its own. So treat food as fuel for the work, not something to restrict." },
    { icon: Utensils, title: "Everyday plate", color: "var(--pine)",
      body: "Build meals around whole foods: a protein source, plenty of vegetables, and real carbohydrates (rice, potatoes, oats, bread, pasta) — carbs are fuel, not the enemy. Where your eating tends to slip, keep the swaps simple: fruit, yoghurt or nuts instead of sugary snacks; water or sparkling water instead of soft drinks." },
    { icon: Timer, title: "Around your runs", color: "var(--sky)",
      body: "Before a longer or quality run, have some easy carbs 1–2 hours ahead. After it, get carbs + protein in within the hour to recover. For anything under ~75–90 minutes you don't need gels — water is enough. Practise your race-morning breakfast before your long runs so nothing's a surprise on 15 November." },
    { icon: Wine, title: "Alcohol — the easy win", color: "var(--warn)",
      body: "A drink now and then is fine. The change that moves the needle most: skip alcohol the night before — ideally the day or two before — your hard and long runs. It wrecks sleep quality, dehydrates you, and flattens the next day's session. Protect those nights and you'll feel the difference fast." },
    { icon: Flag, title: "Race week", color: "var(--ink)",
      body: "Eat a little more carbohydrate over the final 2–3 days, stay well hydrated, and don't try anything new on race day — same breakfast, same kit, same shoes you've trained in." },
  ];

  return (
    <div style={{ display: "grid", gap: 16 }}>
      <div style={{ display: "grid", gap: 10 }}>
        {blocks.map((b, i) => (
          <div key={i} className="card" style={{ padding: 16, display: "flex", gap: 13 }}>
            <div style={{ flexShrink: 0, width: 38, height: 38, borderRadius: 10, background: b.color, display: "grid", placeItems: "center" }}><b.icon size={19} color="#fff" /></div>
            <div>
              <strong style={{ fontSize: 15 }}>{b.title}</strong>
              <p style={{ fontSize: 13.5, color: "var(--ink-soft)", margin: "5px 0 0", lineHeight: 1.55 }}>{b.body}</p>
            </div>
          </div>
        ))}
      </div>

      <div className="card" style={{ padding: 18 }}>
        <div className="eyebrow">Weekly check-in</div>
        <p style={{ fontSize: 13, color: "var(--ink-soft)", margin: "8px 0 14px", lineHeight: 1.5 }}>
          A light weekly note on how training is feeling. Tracking your energy and mood across the weeks before the race builds a useful picture of how you're holding up — and it's good to have the history to look back on.
        </p>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(130px,1fr))", gap: 10 }}>
          <label style={lbl}>Week ending<input type="date" className="field" value={c.date} onChange={(e) => setC({ ...c, date: e.target.value })} /></label>
          <label style={lbl}>Alcohol (drinks)<input className="field mono" inputMode="numeric" value={c.alcohol} onChange={(e) => setC({ ...c, alcohol: e.target.value })} /></label>
        </div>
        <label style={{ ...lbl, marginTop: 10, display: "block" }}>How I ate this week
          <textarea className="field" rows={2} placeholder="e.g. mostly home-cooked, a few takeaways, snacky on Wed…" value={c.eating} onChange={(e) => setC({ ...c, eating: e.target.value })} style={{ resize: "vertical" }} />
        </label>
        <div style={{ marginTop: 10 }}>
          <div style={{ ...lbl, marginBottom: 6 }}>Energy on your runs</div>
          <div style={{ display: "flex", gap: 6 }}>
            {["Flat", "Low", "Fine", "Good", "Great"].map((f, i) => (
              <button key={f} onClick={() => setC({ ...c, energy: i + 1 })}
                style={{ flex: 1, padding: "8px 4px", borderRadius: 8, cursor: "pointer", fontFamily: "inherit", fontSize: 12.5, fontWeight: 600,
                  border: `1.5px solid ${c.energy === i + 1 ? "var(--pine)" : "var(--line)"}`,
                  background: c.energy === i + 1 ? "var(--pine)" : "#fff", color: c.energy === i + 1 ? "#fff" : "var(--ink-soft)" }}>{f}</button>
            ))}
          </div>
        </div>
        <label style={{ ...lbl, marginTop: 10, display: "block" }}>Sleep / notes
          <textarea className="field" rows={2} placeholder="Anything worth flagging…" value={c.notes} onChange={(e) => setC({ ...c, notes: e.target.value })} style={{ resize: "vertical" }} />
        </label>
        <button onClick={add} disabled={!c.eating.trim()} style={{ ...primaryBtn, marginTop: 12, opacity: c.eating.trim() ? 1 : 0.5 }}><Plus size={16} /> Save check-in</button>
      </div>

      {checkins.length >= 2 && (
        <div className="card" style={{ padding: "18px 12px 14px" }}>
          <div className="eyebrow" style={{ padding: "0 6px" }}>Energy over time</div>
          <div style={{ height: 200, marginTop: 12 }}>
            <ResponsiveContainer width="100%" height="100%">
              <LineChart data={[...checkins].sort((a, b) => a.date.localeCompare(b.date)).map((x) => ({ date: new Date(x.date).toLocaleDateString("en-GB", { day: "numeric", month: "short" }), energy: Number(x.energy) }))} margin={{ top: 5, right: 14, left: -14, bottom: 0 }}>
                <CartesianGrid stroke="var(--line)" strokeDasharray="3 3" vertical={false} />
                <XAxis dataKey="date" tickLine={false} axisLine={{ stroke: "var(--line)" }} />
                <YAxis domain={[1, 5]} ticks={[1, 2, 3, 4, 5]} tickFormatter={(v) => ["", "Flat", "Low", "Fine", "Good", "Great"][v]} tickLine={false} axisLine={false} width={48} />
                <Tooltip formatter={(v) => [["", "Flat", "Low", "Fine", "Good", "Great"][v], "Energy"]} contentStyle={tooltipStyle} />
                <Line type="monotone" dataKey="energy" stroke="var(--clay)" strokeWidth={2.5} dot={{ r: 3, fill: "var(--clay)" }} />
              </LineChart>
            </ResponsiveContainer>
          </div>
        </div>
      )}

      {loaded && checkins.length > 0 && (
        <div className="card" style={{ padding: 18 }}>
          <div className="eyebrow">Past check-ins</div>
          <div style={{ display: "grid", gap: 8, marginTop: 12 }}>
            {checkins.map((x) => (
              <div key={x.id} style={{ display: "flex", gap: 12, padding: "10px 12px", border: "1px solid var(--line)", borderRadius: 10, background: "#fff" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", gap: 10, alignItems: "baseline", flexWrap: "wrap" }}>
                    <span className="mono" style={{ fontSize: 12.5, fontWeight: 700 }}>{new Date(x.date).toLocaleDateString("en-GB", { day: "numeric", month: "short" })}</span>
                    <span style={{ fontSize: 12, color: "var(--ink-soft)" }}>{["Flat", "Low", "Fine", "Good", "Great"][x.energy - 1]} energy · {x.alcohol} drink{x.alcohol === "1" ? "" : "s"}</span>
                  </div>
                  {x.eating && <div style={{ fontSize: 12.5, color: "var(--ink-soft)", marginTop: 3, lineHeight: 1.4 }}>{x.eating}</div>}
                </div>
                <button onClick={() => del(x.id)} aria-label="delete" style={{ border: "none", background: "none", cursor: "pointer", color: "var(--ink-soft)", padding: 4 }}><Trash2 size={15} /></button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------------- course ---------------- */
function CourseView() {
  const path = COURSE.map((p, i) => `${i ? "L" : "M"}${p[0]} ${p[1]}`).join(" ");
  const tips = [
    ["Don't bank time early", "The opening kilometres feel easy. Hold 6:00, no faster — every second spent too fast up front is paid back double later."],
    ["Run the hills by effort", "On the climbs, let your pace slip 15–25 s/km and keep the effort even. Fighting to hold 6:00 uphill is how races fall apart."],
    ["Cash in on the descents", "This course is famous as the world's fastest 15 km because of its long downhill stretch — relax, lengthen your stride and let gravity give the time back."],
    ["Aim for even effort, not even pace", "Some kilometres will read 6:20, others 5:40. If the effort stays steady, the average lands on 6:00."],
  ];
  return (
    <div style={{ display: "grid", gap: 16 }}>
      <div className="card" style={{ padding: 18 }}>
        <div className="eyebrow">The route · 15.08 km loop</div>
        <p style={{ fontSize: 13.5, color: "var(--ink-soft)", margin: "8px 0 12px", lineHeight: 1.5 }}>
          The official race route — a loop from Nijmegen out into the wooded hills of Berg en Dal and back, with the 5K and 10K marks and drink stations shown. The .gpx version is below if you want it on your watch.
        </p>
        <img src={COURSE_IMG} alt="Zevenheuvelenloop course map through Nijmegen and Berg en Dal" style={{ width: "100%", height: "auto", display: "block", borderRadius: 12, border: "1px solid var(--line)" }} />
        <div style={{ marginTop: 12 }}>
          <button onClick={downloadGPX} style={{ ...primaryBtn, background: "var(--pine)" }}><Download size={16} /> Download the .gpx route</button>
        </div>
      </div>

      <div className="card" style={{ padding: 18 }}>
        <div className="eyebrow">Race-day pacing</div>
        <p style={{ fontSize: 13.5, color: "var(--ink-soft)", margin: "8px 0 14px", lineHeight: 1.5 }}>
          The "Seven Hills" name sounds brutal, but the course holds the world records for the 15 km — it's rolling and genuinely fast if you pace it right.
        </p>
        <div style={{ display: "grid", gap: 9 }}>
          {tips.map((t, i) => (
            <div key={i} style={{ display: "flex", gap: 12, padding: "11px 13px", border: "1px solid var(--line)", borderRadius: 10, background: "#fff" }}>
              <span className="mono" style={{ fontSize: 13, fontWeight: 700, color: "var(--clay)", flexShrink: 0 }}>{pad(i + 1)}</span>
              <div>
                <strong style={{ fontSize: 14 }}>{t[0]}</strong>
                <div style={{ fontSize: 13, color: "var(--ink-soft)", marginTop: 2, lineHeight: 1.45 }}>{t[1]}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ---------------- shared styles ---------------- */
const lbl = { fontSize: 12, fontWeight: 600, color: "var(--ink-soft)", display: "flex", flexDirection: "column", gap: 5 };
const primaryBtn = { display: "inline-flex", alignItems: "center", gap: 7, padding: "11px 18px", background: "var(--ink)", color: "#fff", border: "none", borderRadius: 9, cursor: "pointer", fontFamily: "inherit", fontSize: 14, fontWeight: 600 };
const linkBtn = { background: "none", border: "none", color: "var(--sky)", cursor: "pointer", fontFamily: "inherit", fontSize: 13, fontWeight: 600, padding: 0 };
const inlineLink = { background: "none", border: "none", color: "var(--sky)", cursor: "pointer", fontFamily: "inherit", fontWeight: 600, padding: 0, fontSize: "inherit", textDecoration: "underline" };
const tooltipStyle = { background: "var(--ink)", border: "none", borderRadius: 8, color: "#fff", fontSize: 12, fontFamily: "'Space Mono',monospace" };

createRoot(document.getElementById("root")).render(<App />);

</script>
